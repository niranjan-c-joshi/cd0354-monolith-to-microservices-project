name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build reverseproxy
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/reverseproxy:latest \
            ./udagram-reverseproxy

      - name: Build api-user
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/udagram-api-user:latest \
            ./udagram-api-user

      - name: Build api-feed
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/udagram-api-feed:latest \
            ./udagram-api-feed

      - name: Build frontend
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/udagram-frontend:latest \
            ./udagram-frontend

      - name: Push reverseproxy
        run: docker push ${{ secrets.DOCKER_USERNAME }}/reverseproxy:latest

      - name: Push api-user
        run: docker push ${{ secrets.DOCKER_USERNAME }}/udagram-api-user:latest

      - name: Push api-feed
        run: docker push ${{ secrets.DOCKER_USERNAME }}/udagram-api-feed:latest

      - name: Push frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/udagram-frontend:latest